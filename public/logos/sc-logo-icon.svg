<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f3f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d70;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f25a1a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#navyGrad)"/>
  
  <!-- Inner decorative ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  
  <!-- SC monogram -->
  <g>
    <!-- S -->
    <path d="M 30 35 Q 35 32 40 32 Q 45 32 45 37 Q 45 41 40 43 L 40 43 Q 45 43 45 48 Q 45 53 40 55 Q 35 57 30 55" 
          fill="white" stroke="none"/>
    
    <!-- C -->
    <path d="M 65 32 L 60 32 Q 55 32 55 37 L 55 63 Q 55 68 60 68 L 65 68" 
          fill="none" stroke="url(#orangeGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bottom accent -->
  <line x1="25" y1="75" x2="75" y2="75" stroke="url(#orangeGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
